<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>Books - instant-vlist demo</title>
	<style>
		body { font-family: system-ui, sans-serif; margin: 0; padding: 16px; }
		#controls { margin-bottom: 12px; display:flex; gap:8px; align-items:center; }
		#controls select { padding: 8px; min-width: 160px; }
		#list { height: 70vh; overflow:auto; border:1px solid #ddd; padding:8px; }
		.item { padding:8px; border-bottom:1px solid #eee; }
		.title { font-weight:700; }
		.meta { color:#555; font-size:0.9em; margin-top:4px; }
		mark { background: #fffb91; }
	</style>
</head>
<body>
	<div id="controls">
		<input id="search" placeholder="Search title..." style="flex:1;padding:8px" />
		<select id="publisher-filter" aria-label="Filter by publisher">
			<option value="">All publishers</option>
		</select>
		<select id="category-filter" aria-label="Filter by category">
			<option value="">All categories</option>
		</select>
		<button id="clear">Clear</button>
	</div>
	<div id="list" aria-live="polite"></div>

	<script src="instant-vlist.js" type="text/javascript"></script>

	<script>


	function renderItem(item, regex) {

		let text = item.title.replaceAll(regex, '\<mark\>\$&\<\/mark\>')||"";

		return `
			<div class="item" style="cursor:pointer">
				<div class="title">${item.id}, ${text}</div>
				<div class="meta">
					<span class="author">${item.publisher}</span>
					• ${item.year}
					• <em>${item.isbn}</em>
				</div>
				<div class="desc" style="margin-top:6px">
					${item.category}
				</div>
			</div>
		`;
	}

	const container = document.getElementById("list");
	const vlist = VirtualList(container, renderItem, item=>item.title); 	
	const searchInput = document.getElementById("search");
	const publisherSelect = document.getElementById("publisher-filter");
	const categorySelect = document.getElementById("category-filter");
	let searchDebounceTimer = null;

	// Wire search input
	searchInput.addEventListener("input", (e) => {
		clearTimeout(searchDebounceTimer);
		searchDebounceTimer = setTimeout(() => {
			vlist.filter.setSearch(e.target.value);
		}, 500);
	});

	function buildFacetOptions(selectEl, values, placeholder) {
		const selected = selectEl.value;
		selectEl.innerHTML = "";

		const defaultOption = document.createElement("option");
		defaultOption.value = "";
		defaultOption.textContent = placeholder;
		selectEl.appendChild(defaultOption);

		for (const value of values) {
			const option = document.createElement("option");
			option.value = value;
			option.textContent = value;
			selectEl.appendChild(option);
		}

		if (selected && values.includes(selected)) {
			selectEl.value = selected;
		} else {
			selectEl.value = "";
		}
	}

	function refreshFacetControls() {
		buildFacetOptions(publisherSelect, vlist.data.getFacetValues("publisher"), "All publishers");
		buildFacetOptions(categorySelect, vlist.data.getFacetValues("category"), "All categories");
	}

	function applyFacet(attr, value) {
		if (value) {
			vlist.filter.addFacet(attr, value);
		} else {
			vlist.filter.removeFacet(attr);
		}
	}

	publisherSelect.addEventListener("change", (e) => {
		applyFacet("publisher", e.target.value);
	});

	categorySelect.addEventListener("change", (e) => {
		applyFacet("category", e.target.value);
	});

	vlist.data.subscribeResultChanging(() => {
		refreshFacetControls();
	});

	document.getElementById("clear").addEventListener("click", () => {
		clearTimeout(searchDebounceTimer);
		searchInput.value = "";
		publisherSelect.value = "";
		categorySelect.value = "";
		vlist.filter.clearAll();
		refreshFacetControls();
	});

	refreshFacetControls();
	const facetRefreshInterval = setInterval(() => {
		refreshFacetControls();
		if (!vlist.data.isStreaming()) {
			clearInterval(facetRefreshInterval);
		}
	}, 300);

	const params = new URLSearchParams(window.location.search);
	const defaultRecordCount = params.get("num_records") || "1000";
	// const defaultStreamUrl = `https://books-stream.pavomelk.workers.dev/?num_records=${encodeURIComponent(defaultRecordCount)}`;
	const defaultStreamUrl = `http://127.0.0.1:8787/?num_records=${encodeURIComponent(defaultRecordCount)}`;
	const streamUrl = params.get("stream") || defaultStreamUrl;

	vlist.data.fetchStream(encodeURI(streamUrl)).catch((err) => {
		clearInterval(facetRefreshInterval);
		console.error("Failed to fetch stream:", err);
		container.innerHTML = '<div class="item">Failed to load data stream. Use ?num_records=500 or ?stream=YOUR_NDJSON_URL.</div>';
	});

	</script>

</body>
</html>
